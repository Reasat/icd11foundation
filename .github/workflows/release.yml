# Releases: workflow_dispatch only (no cron / push auto-release) — see docs/plan.md § Phase 8.
name: Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag (e.g. v2026-04-16)"
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pipx install uv

      - name: Install dependencies
        run: uv sync

      - name: Restore API node cache
        uses: actions/cache@v4
        with:
          path: tmp/cache
          key: icd11foundation-api-cache-${{ hashFiles('scripts/acquire.py') }}
          restore-keys: |
            icd11foundation-api-cache-

      - name: Acquire
        env:
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
        run: |
          mkdir -p tmp
          uv run python scripts/acquire.py --output tmp/icd11foundation_raw.json

      - name: Extract
        run: uv run python scripts/extract.py --input tmp/icd11foundation_raw.json --output icd11foundation.linkml.yaml

      - name: Validate
        run: |
          uv run python -m linkml.validator.cli \
            -s linkml/mondo_source_schema.yaml \
            -C OntologyDocument \
            icd11foundation.linkml.yaml

      - name: Verify
        run: |
          uv run python scripts/verify.py \
            --yaml icd11foundation.linkml.yaml \
            --raw-json tmp/icd11foundation_raw.json

      - name: Derive OWL
        run: |
          uv run python -m linkml_owl.dumpers.owl_dumper \
            -s linkml/mondo_source_schema.yaml \
            -f yaml \
            -o icd11foundation.linkml.owl \
            icd11foundation.linkml.yaml || echo "::warning::data2owl failed — see docs/pipeline_incidents.md"

      - name: Create GitHub Release
        if: success() && hashFiles('icd11foundation.linkml.yaml') != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          files: |
            icd11foundation.linkml.yaml
            icd11foundation.linkml.owl
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
