# Build Foundation YAML/OWL; publish release assets. Manual run only — see docs/plan.md § Phase 8.
name: Build and release

on:
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pipx install uv

      - name: Install dependencies
        run: uv sync

      - name: Mondo-source-ingest pins (linkml main / linkml-owl)
        run: |
          uv pip install linkml-owl==0.5.0 \
            "linkml @ git+https://github.com/linkml/linkml.git@main#subdirectory=packages/linkml" \
            "linkml-runtime @ git+https://github.com/linkml/linkml.git@main#subdirectory=packages/linkml_runtime"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install ROBOT
        run: curl -fsSL -o /tmp/robot.jar https://github.com/ontodev/robot/releases/download/v1.9.8/robot.jar

      - name: Restore API node cache
        uses: actions/cache@v4
        with:
          path: tmp/cache
          key: icd11foundation-api-cache-${{ hashFiles('scripts/acquire.py') }}
          restore-keys: |
            icd11foundation-api-cache-

      - name: Acquire
        env:
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
        run: |
          mkdir -p tmp
          uv run python scripts/acquire.py --output tmp/icd11foundation_raw.json

      - name: Extract
        run: uv run python scripts/extract.py --input tmp/icd11foundation_raw.json --output icd11foundation.linkml.yaml

      - name: Validate
        run: |
          uv run python -m linkml.validator.cli \
            -s linkml/mondo_source_schema.yaml \
            -C OntologyDocument \
            icd11foundation.linkml.yaml

      - name: Verify
        run: |
          uv run python scripts/verify.py \
            --yaml icd11foundation.linkml.yaml \
            --raw-json tmp/icd11foundation_raw.json

      - name: Derive OWL
        run: |
          uv run python scripts/sanitize_literals_for_owl_export.py \
            --input icd11foundation.linkml.yaml \
            --output tmp/icd11foundation_for_owl.json
          uv run python -m linkml_owl.dumpers.owl_dumper \
            -s linkml/mondo_source_schema.yaml \
            -f json \
            -o icd11foundation.linkml.owl \
            tmp/icd11foundation_for_owl.json

      - name: ROBOT QC (reports/)
        run: |
          mkdir -p reports
          java -Xmx8g -jar /tmp/robot.jar measure -i icd11foundation.linkml.owl -m extended -f json -o reports/metrics.json
          java -Xmx8g -jar /tmp/robot.jar query -i icd11foundation.linkml.owl -f tsv --query sparql/count_classes_by_top_level.sparql reports/top-level-counts.tsv

      - name: Set release tag
        id: version
        run: echo "tag=v$(date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Create release and upload assets
        if: success() && hashFiles('icd11foundation.linkml.yaml') != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          files: |
            icd11foundation.linkml.yaml
            icd11foundation.linkml.owl
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
