name: Build

on:
  push:
    branches: [main]
    paths:
      - "justfile"
      - "config/**"
      - "linkml/**"
      - "scripts/**"
      - "pyproject.toml"
      - "uv.lock"
      - "src/**"
  pull_request:
    branches: [main]
    paths:
      - "justfile"
      - "config/**"
      - "linkml/**"
      - "scripts/**"
      - "pyproject.toml"
      - "uv.lock"
      - "src/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pipx install uv

      - name: Install dependencies
        run: uv sync

      - name: Restore API node cache
        uses: actions/cache@v4
        with:
          path: tmp/cache
          key: icd11foundation-api-cache-${{ hashFiles('scripts/acquire.py') }}
          restore-keys: |
            icd11foundation-api-cache-

      - name: Acquire
        env:
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
        run: |
          mkdir -p tmp
          uv run python scripts/acquire.py --output tmp/icd11foundation_raw.json

      - name: Extract
        run: uv run python scripts/extract.py --input tmp/icd11foundation_raw.json --output icd11foundation.linkml.yml

      - name: Validate
        run: |
          uv run python -m linkml.validator.cli \
            -s linkml/mondo_source_schema.yaml \
            -C OntologyDocument \
            icd11foundation.linkml.yml

      - name: Verify
        run: |
          uv run python scripts/verify.py \
            --yaml icd11foundation.linkml.yml \
            --raw-json tmp/icd11foundation_raw.json

      - name: Derive OWL
        run: |
          uv run python -m linkml_owl.dumpers.owl_dumper \
            -s linkml/mondo_source_schema.yaml \
            -f yaml \
            -o icd11foundation.linkml.owl \
            icd11foundation.linkml.yml || echo "::warning::data2owl failed — see docs/report.md"

      - name: Upload artifacts
        if: success() && hashFiles('icd11foundation.linkml.yml') != ''
        uses: actions/upload-artifact@v4
        with:
          name: icd11foundation-build
          path: |
            icd11foundation.linkml.yml
            icd11foundation.linkml.owl
